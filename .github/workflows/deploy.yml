name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd ~/TaleX-Server
            git pull origin main

            # Create .env from GitHub Secrets
            cat > .env << ENVEOF
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            REDIS_USERNAME=${{ secrets.REDIS_USERNAME }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            REDIS_SSL=${{ secrets.REDIS_SSL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            GOOGLE_CLIENT_ID_WEB=${{ secrets.GOOGLE_CLIENT_ID_WEB }}
            GOOGLE_CLIENT_ID_ANDROID=${{ secrets.GOOGLE_CLIENT_ID_ANDROID }}
            FPT_AI_API_KEY=${{ secrets.FPT_AI_API_KEY }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            QUESTDB_USER=${{ secrets.QUESTDB_USER }}
            QUESTDB_PASSWORD=${{ secrets.QUESTDB_PASSWORD }}
            MEDIA_PROVIDER=${{ secrets.MEDIA_PROVIDER }}
            MAX_VIDEO_SIZE_MB=${{ secrets.MAX_VIDEO_SIZE_MB }}
            VIDEO_UPLOAD_CHUNK_SIZE_MB=${{ secrets.VIDEO_UPLOAD_CHUNK_SIZE_MB }}
            DEFAULT_VIDEO_PROTECTION_TYPE=${{ secrets.DEFAULT_VIDEO_PROTECTION_TYPE }}
            SIGNED_PLAYBACK_TTL_SECONDS=${{ secrets.SIGNED_PLAYBACK_TTL_SECONDS }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            CLOUDINARY_AUTH_TOKEN_KEY=${{ secrets.CLOUDINARY_AUTH_TOKEN_KEY }}
            CLOUDINARY_HLS_STREAMING_PROFILE=${{ secrets.CLOUDINARY_HLS_STREAMING_PROFILE }}
            CLOUDINARY_IMAGE_FOLDER=${{ secrets.CLOUDINARY_IMAGE_FOLDER }}
            CLOUDINARY_VIDEO_FOLDER=${{ secrets.CLOUDINARY_VIDEO_FOLDER }}
            CLOUDINARY_PROVIDER_DELIVERY_TYPE=${{ secrets.CLOUDINARY_PROVIDER_DELIVERY_TYPE }}
            CLOUDINARY_WEBHOOK_URL=${{ secrets.CLOUDINARY_WEBHOOK_URL }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_CLOUDFRONT_DOMAIN=${{ secrets.AWS_CLOUDFRONT_DOMAIN }}
            AWS_CLOUDFRONT_KEY_PAIR_ID=${{ secrets.AWS_CLOUDFRONT_KEY_PAIR_ID }}
            AWS_CLOUDFRONT_PRIVATE_KEY=${{ secrets.AWS_CLOUDFRONT_PRIVATE_KEY }}
            AWS_MEDIACONVERT_ENDPOINT=${{ secrets.AWS_MEDIACONVERT_ENDPOINT }}
            AWS_MEDIACONVERT_QUEUE_ARN=${{ secrets.AWS_MEDIACONVERT_QUEUE_ARN }}
            AWS_MEDIACONVERT_ROLE_ARN=${{ secrets.AWS_MEDIACONVERT_ROLE_ARN }}
            AWS_SQS_QUEUE_URL=${{ secrets.AWS_SQS_QUEUE_URL }}
            KAFKA_BOOTSTRAP_SERVERS=${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
            QUESTDB_HOST=${{ secrets.QUESTDB_HOST }}
            QUESTDB_PORT=${{ secrets.QUESTDB_PORT }}
            SEPAY_ACCOUNT_NUMBER=${{ secrets.SEPAY_ACCOUNT_NUMBER }}
            SEPAY_BANK_NAME=${{ secrets.SEPAY_BANK_NAME }}
            SEPAY_WEBHOOK_API_KEY=${{ secrets.SEPAY_WEBHOOK_API_KEY }}
            SEPAY_TRANSFER_CONTENT_PREFIX=${{ secrets.SEPAY_TRANSFER_CONTENT_PREFIX }}
            MONGO_USERNAME=${{ secrets.MONGO_USERNAME }}
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            MONGO_HOST=${{ secrets.MONGO_HOST }}
            MONGO_APP_NAME=${{ secrets.MONGO_APP_NAME }}
            MONGO_DATABASE=${{ secrets.MONGO_DATABASE }}
            ENVEOF

            sed -i 's/^[[:space:]]*//' .env

            # Write Kafka PEM certificates to files (cannot store multiline in .env)
            mkdir -p kafka-certs
            echo '${{ secrets.KAFKA_ACCESS_CERTB64 }}' | sed 's/\\n/\n/g' > kafka-certs/access-cert.pem
            echo '${{ secrets.KAFKA_CA_CERTB64 }}' | sed 's/\\n/\n/g' > kafka-certs/ca-cert.pem
            echo '${{ secrets.KAFKA_ACCESS_KEYB64 }}' | sed 's/\\n/\n/g' > kafka-certs/access-key.pem

            # Ensure docker-compose has Kafka cert env vars
            grep -q 'KAFKA_ACCESS_CERTB64' docker-compose.prod.yml || \
              sed -i '/SPRING_PROFILES_ACTIVE=prod/a\      - KAFKA_ACCESS_CERTB64\n      - KAFKA_CA_CERTB64\n      - KAFKA_ACCESS_KEYB64' docker-compose.prod.yml

            # Cleanup old images only (keep build cache for faster builds)
            docker image prune -af --filter "until=48h" 2>/dev/null || true

            # Build and start with Kafka certs from files
            export KAFKA_ACCESS_CERTB64="$(cat kafka-certs/access-cert.pem)"
            export KAFKA_CA_CERTB64="$(cat kafka-certs/ca-cert.pem)"
            export KAFKA_ACCESS_KEYB64="$(cat kafka-certs/access-key.pem)"
            COMPOSE_DOCKER_CLI_BUILD=1 DOCKER_BUILDKIT=1 \
              docker compose -f docker-compose.prod.yml up --build -d

            # Post-build cleanup (remove dangling images only)
            docker image prune -f 2>/dev/null || true

            # Health check — wait up to 120s for backend to start
            echo "Waiting for backend health check..."
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8080/api-docs > /dev/null 2>&1; then
                echo "Backend is healthy after $((i*5))s!"
                exit 0
              fi
              sleep 5
            done
            echo "WARNING: Backend health check failed after 120s"
