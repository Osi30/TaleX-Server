services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Database
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=talex-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      # Redis (Redis Cloud)
      - REDIS_HOST=${REDIS_HOST:-station-empowering-kiss-54115.db.redis.io}
      - REDIS_PORT=${REDIS_PORT:-15883}
      - REDIS_USERNAME=${REDIS_USERNAME:-default}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      # JWT
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      # Google OAuth2
      - GOOGLE_CLIENT_ID_WEB=${GOOGLE_CLIENT_ID_WEB:-}
      - GOOGLE_CLIENT_ID_ANDROID=${GOOGLE_CLIENT_ID_ANDROID:-}
      - GOOGLE_CLIENT_ID_IOS=${GOOGLE_CLIENT_ID_IOS:-}
      # Mail (Gmail SMTP)
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=talex-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:8.2.3
    ports:
      - "8812:8812"
      - "9000:9000"
      - "9009:9009"
    environment:
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=quest
    volumes:
      - questdb-data:/var/lib/questdb

volumes:
  pgdata:
  questdb-data:
