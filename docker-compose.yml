services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB host for Docker internal networking
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=talex-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=12345
      # Override QuestDB host for Docker internal networking
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export KAFKA_CA_CERTB64=$$(printf '%b' "$$KAFKA_CA_CERTB64")
        export KAFKA_ACCESS_CERTB64=$$(printf '%b' "$$KAFKA_ACCESS_CERTB64")
        export KAFKA_ACCESS_KEYB64=$$(printf '%b' "$$KAFKA_ACCESS_KEYB64")
        exec java -jar app.jar
    # Give Spring Kafka consumers time to send a clean LeaveGroup on shutdown,
    # otherwise a fast restart leaves a zombie member on the broker until
    # session.timeout.ms expires.
    stop_grace_period: 30s
    depends_on:
      db:
        condition: service_healthy
      questdb:
        condition: service_healthy

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=talex-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
    command: postgres -c wal_level=logical
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  questdb:
    image: questdb/questdb:8.2.3
    ports:
      - "8812:8812"
      - "9000:9000"
      - "9009:9009"
    environment:
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=quest
    volumes:
      - questdb-data:/var/lib/questdb
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8812'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s



volumes:
  pgdata:
  questdb-data:
