spring:
  application:
    name: talex-server
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:12345}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:talex-db}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      enabled: true
      max-file-size: 500MB
      max-request-size: 500MB
  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

integration:
  clients:
    fpt-ai:
      base-url: https://api.fpt.ai
      api-key: gApfOz6B3r2Z0OK0JKqWvWfvhq1DC60O
      connection-timeout-ms: 5000
      read-timeout-ms: 30000

terms:
  version: v1

eKYC:
  id-recognition:
    provider: fpt-ai

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10             # Xét 10 request gần nhất
        minimumNumberOfCalls: 5           # Cần tối thiểu 5 request để bắt đầu tính toán tỷ lệ lỗi
        failureRateThreshold: 50          # Nếu 50% số request bị lỗi hoặc timeout (>15s), mạch sẽ NGẮT (Open)
        slowCallRateThreshold: 50         # Nếu 50% số request chạy chậm hơn thời gian quy định
        slowCallDurationThreshold: 10000ms # Định nghĩa request chậm là > 10 giây
        waitDurationInOpenState: 30000ms  # Sau khi ngắt mạch, bắt buộc chờ 30 giây mới cho phép thử lại (Half-Open)
        permittedNumberOfCallsInHalfOpenState: 3 # Cho phép 3 request đi thử nghiệm khi mạch đang Half-Open
        automaticTransitionFromOpenToHalfOpenEnabled: true
    instances:
      fptAiFrontOcr:
        baseConfig: default
      fptAiBackOcr:
        baseConfig: default

